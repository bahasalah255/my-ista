<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Quiz M101 - Informatique</title>
  <link rel="stylesheet" href="m101.css">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
  .option-btn.correct { background-color: #28a745; color: white; }
  .option-btn.wrong { background-color: #dc3545; color: white; }
  .option-btn { text-align: left; width: 100%; }
  .quiz-container h5.question { min-height: 3rem; }
</style>
</head>
<body>
  <div class="container my-5">
    <h2 class="text-center mb-4">Quiz M101 — Informatique</h2>

    <!-- PARTIE 1 -->
    <div class="quiz-card shadow rounded p-4 mb-4" id="quiz-part1">
      <h4 class="mb-3">Partie 1 — Rôle et compétences</h4>
      <div id="question-p1" class="mb-3 question"></div>
      <div id="options-p1" class="d-grid gap-2 mb-3"></div>
      <div class="d-flex justify-content-between align-items-center">
        <div id="progress-p1" class="text-muted small"></div>
        <button id="next-p1" class="btn btn-primary" style="display:none;">Suivant</button>
      </div>
    </div>

    <!-- PARTIE 2 -->
    <div class="quiz-card shadow rounded p-4 mb-4" id="quiz-part2">
      <h4 class="mb-3">Partie 2 — Sigles</h4>
      <div id="question-p2" class="mb-3 question"></div>
      <div id="options-p2" class="d-grid gap-2 mb-3"></div>
      <div class="d-flex justify-content-between align-items-center">
        <div id="progress-p2" class="text-muted small"></div>
        <button id="next-p2" class="btn btn-success" style="display:none;">Suivant</button>
      </div>
    </div>

    <!-- Résultats finaux -->
    <div id="final-results" class="mt-4 text-center" style="display:none;">
      <h3>Résultats finaux</h3>
      <p id="final-score" class="lead"></p>
      <div id="breakdown" class="text-start mx-auto" style="max-width:640px"></div>
      <a href="#" id="restart" class="btn btn-outline-primary mt-3">Recommencer le quiz</a>
    </div>
  </div>

  <script src="m101.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
