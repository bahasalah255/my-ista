<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Quiz M102 - Algorithmique</title>
  <link rel="stylesheet" href="quiz.css">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="quiz.css">
</head>
<body>
  <div class="container my-5">
    <h2 class="text-center mb-4">Quiz M102 — Algorithmique</h2>

    <!-- PART A: Analyser / Modéliser / Approches (questions 1-5) -->
    <div class="quiz-card shadow rounded p-4 mb-4" id="quiz-part1">
      <h4 class="mb-3">Part 1 — Analyser / Modéliser / Approches</h4>
      <div id="question-p1" class="mb-3 question"></div>
      <div id="options-p1" class="d-grid gap-2 mb-3"></div>
      <div class="d-flex justify-content-between align-items-center">
        <div id="progress-p1" class="text-muted small"></div>
        <button id="next-p1" class="btn btn-primary" style="display:none;">Suivant</button>
      </div>
    </div>

    <!-- PART B: Formuler un traitement (questions 6-14) -->
    <div class="quiz-card shadow rounded p-4 mb-4" id="quiz-part2">
      <h4 class="mb-3">Part 2 — Formuler un traitement</h4>
      <div id="question-p2" class="mb-3 question"></div>
      <div id="options-p2" class="d-grid gap-2 mb-3"></div>
      <div class="d-flex justify-content-between align-items-center">
        <div id="progress-p2" class="text-muted small"></div>
        <button id="next-p2" class="btn btn-success" style="display:none;">Suivant</button>
      </div>
    </div>

    <!-- PART C: Programmer en Python (questions 15-28) -->
    <div class="quiz-card shadow rounded p-4 mb-4" id="quiz-part3">
      <h4 class="mb-3">Part 3 — Programmer en Python</h4>
      <div id="question-p3" class="mb-3 question"></div>
      <div id="options-p3" class="d-grid gap-2 mb-3"></div>
      <div class="d-flex justify-content-between align-items-center">
        <div id="progress-p3" class="text-muted small"></div>
        <button id="next-p3" class="btn btn-warning" style="display:none;">Suivant</button>
      </div>
    </div>

    <!-- PART D: Déployer la solution Python (questions 29-34) -->
    <div class="quiz-card shadow rounded p-4 mb-4" id="quiz-part4">
      <h4 class="mb-3">Part 4 — Déployer la solution Python</h4>
      <div id="question-p4" class="mb-3 question"></div>
      <div id="options-p4" class="d-grid gap-2 mb-3"></div>
      <div class="d-flex justify-content-between align-items-center">
        <div id="progress-p4" class="text-muted small"></div>
        <button id="next-p4" class="btn btn-info" style="display:none;">Suivant</button>
      </div>
    </div>

    <!-- Final results -->
    <div id="final-results" class="mt-4 text-center" style="display:none;">
      <h3>Résultats finaux</h3>
      <p id="final-score" class="lead"></p>
      <div id="breakdown" class="text-start mx-auto" style="max-width:640px"></div>
      <a href="#" id="restart" class="btn btn-outline-primary mt-3">Recommencer le quiz</a>
    </div>
  </div>

  <!-- JS -->
  <script src="m102-quiz.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
