<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Quiz M103 - POO Python</title>
  <link rel="stylesheet" href="quiz.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container my-5">
    <h2 class="text-center mb-4">Quiz M103 — POO Python</h2>

    <div class="quiz-card shadow rounded p-4 mb-4" id="quiz-poo">
      <div id="question-poo" class="mb-3 question"></div>
      <div id="options-poo" class="d-grid gap-2 mb-3"></div>
      <div class="d-flex justify-content-between align-items-center">
        <div id="progress-poo" class="text-muted small"></div>
        <button id="next-poo" class="btn btn-primary" style="display:none;">Suivant</button>
      </div>
    </div>

    <div id="final-results" class="mt-4 text-center" style="display:none;">
      <h3>Résultats finaux</h3>
      <p id="final-score" class="lead"></p>
      <div id="breakdown" class="text-start mx-auto" style="max-width:640px"></div>
      <a href="#" id="restart" class="btn btn-outline-primary mt-3">Recommencer le quiz</a>
    </div>
  </div>

  <script src="m103.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
